# Swift-DETR Tiny — ultra-lightweight, real-time edge inference
# Backbone: SwiftNet-Tiny (~6M params, dims=[32,64,128,256])
# Transformer: 256-dim, 2 decoder layers, 300 queries
# Input: 512×512 (divisible by 32)

model:
  model_config:
    class_path: swiftdetr.config.SwiftDetrTinyConfig
    init_args:
      num_classes: 80          # COCO (set to your dataset class count)

  train_config:
    class_path: swiftdetr.config.TrainConfig
    init_args:
      dataset_dir: /data/coco       # path to your dataset root
      output_dir: output/swiftdetr_tiny
      epochs: 100
      batch_size: 16
      grad_accum_steps: 2           # effective batch = 32
      num_workers: 4

      # Optimiser
      lr: 1.0e-4
      lr_encoder: 1.5e-4
      lr_vit_layer_decay: 0.8
      lr_component_decay: 0.7
      weight_decay: 1.0e-4
      clip_max_norm: 0.1
      lr_drop: 80
      lr_scheduler: step

      # Augmentation
      multi_scale: true
      expanded_scales: true
      augmentation_backend: cpu

      # EMA
      use_ema: true
      ema_decay: 0.993
      ema_tau: 100

      # Logging
      tensorboard: true
      wandb: false
      checkpoint_interval: 10
      eval_interval: 1
      log_per_class_metrics: false
